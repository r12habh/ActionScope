name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed for GitHub Release creation
  id-token: write  # needed for PyPI trusted publishing

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: release  # requires manual approval in GitHub settings

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Run tests before release
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        # Uses trusted publishing; no API token needed.
        # Requires setting up trusted publisher on PyPI first.

      - name: Compute package version
        id: version
        shell: bash
        run: echo "package-version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          body: |
            ## ActionScope ${{ github.ref_name }}

            ### Install
            ```bash
            pip install actionscope==${{ steps.version.outputs.package-version }}
            ```

            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
