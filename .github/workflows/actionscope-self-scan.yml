name: ActionScope Self-Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  self-scan:
    name: Scan this repo with ActionScope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install ActionScope (from source)
        run: pip install -e ".[dev]"

      - name: Run ActionScope on this repo
        run: |
          actionscope scan . --output-format terminal
          actionscope scan . --output-format json --output-file /tmp/self-scan.json

      - name: Upload scan results
        uses: actions/upload-artifact@v7
        with:
          name: actionscope-self-scan
          path: /tmp/self-scan.json
