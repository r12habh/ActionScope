name: ActionScope Self-Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  self-scan:
    name: Scan this repo with ActionScope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install ActionScope (from source)
        run: pip install -e ".[dev]"

      - name: Run ActionScope on this repo
        run: |
          actionscope scan . --output-format terminal
          actionscope scan . --output-format json --output-file /tmp/self-scan.json

      - name: Upload scan results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: actionscope-self-scan
          path: /tmp/self-scan.json
