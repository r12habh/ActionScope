name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/build_compromised_actions_db_page.py'
      - 'actionscope/data/compromised_actions.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow one concurrent deployment; cancel any in-progress run when a new
# push lands.
concurrency:
  group: pages
  cancel-in-progress: false

# Workflow-level baseline: read-only. Job-scoped permissions below grant the
# write scopes only where they're actually used (least privilege).
permissions:
  contents: read

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # GITHUB_TOKEN must not be written to .git/config; nothing else in
          # this workflow needs git push access.
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install mkdocs and theme
        run: |
          pip install \
            "mkdocs>=1.6" \
            "mkdocs-material>=9.5" \
            "pymdown-extensions>=10.0"

      - name: Generate compromised actions database page
        # Auto-derived from actionscope/data/compromised_actions.json so the
        # docs page is always in sync with the bundled DB.
        run: python scripts/build_compromised_actions_db_page.py

      - name: Build site
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Guard against workflow_dispatch runs launched from feature branches
    # publishing unmerged docs to production Pages. Only main can deploy.
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
