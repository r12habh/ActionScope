name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/build_compromised_actions_db_page.py'
      - 'actionscope/data/compromised_actions.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow one concurrent deployment; cancel any in-progress run when a new
# push lands.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install mkdocs and theme
        run: |
          pip install \
            "mkdocs>=1.6" \
            "mkdocs-material>=9.5" \
            "pymdown-extensions>=10.0"

      - name: Generate compromised actions database page
        # Auto-derived from actionscope/data/compromised_actions.json so the
        # docs page is always in sync with the bundled DB.
        run: python scripts/build_compromised_actions_db_page.py

      - name: Build site
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
